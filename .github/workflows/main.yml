name: Expedition and Extraction Automation

on:
  push:
    paths:
      - "expedition-and-extraction*.zip" # Trigger when ZIP files matching this pattern are added to the root

jobs:
  process_zip:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Identify the ZIP file
    - name: Identify ZIP file
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -type f -name "expedition-and-extraction*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "No matching ZIP file found. Exiting."
          exit 1
        fi
        echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

    # Step 3: Delete the target folder (if needed for any cleanup)
    - name: Delete specific folder (optional cleanup)
      env:
        TARGET_FOLDER: "overrides" # Replace this if there’s a specific folder to clean up
      run: |
        if [ -d "$TARGET_FOLDER" ]; then
          echo "Deleting folder: $TARGET_FOLDER"
          rm -rf "$TARGET_FOLDER"
        else
          echo "Folder $TARGET_FOLDER does not exist. Skipping deletion."
        fi

    # Step 4: Extract the contents of the zip file
    - name: Extract ZIP contents
      run: |
        unzip -o "$ZIP_FILE" -d ./unzipped_contents
        echo "Moving unzipped contents to the repository root"
        mv ./unzipped_contents/* .

    # Step 5: Delete the ZIP file
    - name: Remove ZIP file
      run: |
        echo "Deleting ZIP file: $ZIP_FILE"
        rm -f "$ZIP_FILE"

    # Step 6: Commit and push changes
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Processed and replaced repository contents from $ZIP_FILE" || echo "No changes to commit"
        git push
